name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # VITE_API_BASE is NOT set here on purpose. It comes from the committed
      # .env.production, which Vite loads automatically for a production build.
      #
      # This used to read `VITE_API_BASE: ${{ vars.API_BASE }}`. That is a trap:
      # if the repo variable is unset, it exports an EMPTY string, and an explicit
      # process env var beats .env.production — so the build silently produced a
      # frontend with no backend URL, which then 404s against github.io/api/search.
      # Leaving it out means the committed default always wins.
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
