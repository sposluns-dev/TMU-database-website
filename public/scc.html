    const btn = document.createElement("button");
    btn.textContent = province;
    btn.dataset.province = province;
    btn.style.cssText = "font-size:12px;padding:4px 10px;border:1px solid #bbb;border-radius:12px;background:#fff;cursor:pointer;color:#555;";
    btn.onclick = () => toggleProvince(province, btn);
    filterContainer.appendChild(btn);
  });

  function toggleProvince(province, btn) {
    if (selectedProvinces.has(province)) {
      selectedProvinces.delete(province);
      btn.style.background = "#fff";
      btn.style.color = "#555";
      btn.style.borderColor = "#bbb";
    } else {
      selectedProvinces.add(province);
      btn.style.background = "#c00";
      btn.style.color = "#fff";
      btn.style.borderColor = "#c00";
    }
    redraw();
  }

  window.clearProvinces = function() {
    selectedProvinces.clear();
    filterContainer.querySelectorAll("button").forEach(b => {
      b.style.background = "#fff"; b.style.color = "#555"; b.style.borderColor = "#bbb";
    });
    redraw();
  };

  // Filtered data helpers
  function filteredCases() {
    if (selectedProvinces.size === 0) return cases;
    return cases.filter(d => selectedProvinces.has(d.province));
  }

  function filteredProvinceData() {
    const fc = filteredCases();
    return Array.from(
      d3.rollup(fc.filter(d => d.province), v => v.length, d => d.province),
      ([province, count]) => ({ province, count })
    ).sort((a, b) => b.count - a.count);
  }

  // ── Views ─────────────────────────────────────────────────────────
  let currentView = "map";

  function renderMap() {
    const w = paneW(), h = paneH();
    const pd = filteredProvinceData();
    const countMap = new Map(pd.map(d => [d.province, d.count]));
    const maxCount = d3.max(pd, d => d.count) || 1;
    const rScale = d3.scaleSqrt().domain([0, maxCount]).range([0, w * 0.03]);

    const dots = selectedProvinces.size === 0 ? [] : geoCentroids
      .map(d => ({ ...d, count: countMap.get(d.province) ?? 0 }))
      .filter(d => d.count > 0);

    // Pre-project centroids to pixel coords
    const proj = d3.geoConicConformal().parallels([49, 77]).rotate([96, 0]).fitSize([w, h], provinces);
    const path = d3.geoPath(proj);
    const pixelDots = dots.map(d => {
      const [x, y] = proj(d.lonlat);
      return { ...d, x, y, r: rScale(d.count) };
    }).filter(d => !isNaN(d.x));

    const svg = d3.create("svg").attr("width", w).attr("height", h).style("position", "relative");

    // Tooltip div — attached to body so it sits above SVG
    const tooltip = d3.select("body").select(".map-tooltip").node()
      ? d3.select("body").select(".map-tooltip")
      : d3.select("body").append("div").attr("class", "map-tooltip").style("position", "fixed")
          .style("background", "rgba(0,0,0,0.75)").style("color", "#fff")
          .style("padding", "6px 10px").style("border-radius", "4px")
          .style("font-size", "13px").style("pointer-events", "none")
          .style("z-index", "9999").style("display", "none");

    // Draw provinces
    provinces.features.forEach(f => {
      svg.append("path").attr("d", path(f)).attr("fill", "#bbb").attr("stroke", "white").attr("stroke-width", 0.8);
    });
    svg.append("path").attr("d", path(provincemesh)).attr("fill", "none").attr("stroke", "#999").attr("stroke-width", 0.4);

    // Draw bubbles
    pixelDots.forEach(d => {
      svg.append("circle")
        .attr("cx", d.x).attr("cy", d.y).attr("r", d.r)
        .attr("fill", "#c00").attr("fill-opacity", 0.75)
        .attr("stroke", "white").attr("stroke-width", 1.5)
        .style("cursor", "pointer")
        .on("mousemove", (event) => {
          tooltip.style("display", "block")
            .style("left", (event.clientX + 6) + "px")
            .style("top", (event.clientY - 10) + "px")
            .text(`${d.province}: ${d.count} case${d.count !== 1 ? "s" : ""}`);
        })
        .on("mouseleave", () => tooltip.style("display", "none"));
    });

    // Legend — top right, only when provinces are selected
    if (pixelDots.length > 0) {
      const includeLegend = document.getElementById("includeLegend").checked;
      if (includeLegend) {
        const sorted = [...pixelDots].sort((a, b) => b.count - a.count);
        const legendX = w - 200;
        const legendY = 16;
        const rowH = 22;
        const padX = 12, padY = 10;
        const boxH = padY * 2 + sorted.length * rowH;

        const lg = svg.append("g").attr("transform", `translate(${legendX}, ${legendY})`);
        lg.append("rect")
          .attr("width", 188).attr("height", boxH)
          .attr("rx", 6).attr("fill", "white").attr("fill-opacity", 0.88)
          .attr("stroke", "#ccc").attr("stroke-width", 1);

        sorted.forEach((d, i) => {
          const y = padY + i * rowH + rowH / 2;
          lg.append("circle").attr("cx", padX + 7).attr("cy", y).attr("r", 7)
            .attr("fill", "#c00").attr("fill-opacity", 0.75).attr("stroke", "white").attr("stroke-width", 1);
          lg.append("text").attr("x", padX + 20).attr("y", y + 4)
            .attr("font-size", 12).attr("fill", "#222")
            .text(`${d.province} — ${d.count} case${d.count !== 1 ? "s" : ""}`);
        });
      }
    }

    return svg.node();
  }

  function renderBar() {
    const pd = filteredProvinceData();
    return Plot.plot({
      width: paneW(), height: paneH(),
      marginLeft: 160,
      x: { label: "Number of Cases" },
      y: { label: null },
      marks: [
        Plot.barX(pd, { x: "count", y: "province", fill: "#c00", sort: { y: "x", order: "descending" } }),
        Plot.text(pd, { x: "count", y: "province", text: d => d.count, dx: 6, fill: "#222", fontSize: 12 }),
        Plot.ruleX([0])
      ]
    });
  }

  function renderPie() {
    const pd = filteredProvinceData();
    const w = paneW(), h = paneH();
    const r = Math.min(w, h) / 2 - 40;
    const color = d3.scaleOrdinal(d3.schemeTableau10).domain(pd.map(d => d.province));
    const pie = d3.pie().value(d => d.count)(pd);
    const arc = d3.arc().innerRadius(0).outerRadius(r);

    const svg = d3.create("svg").attr("width", w).attr("height", h);
    const g = svg.append("g").attr("transform", `translate(${w / 2},${h / 2})`);

    g.selectAll("path").data(pie).join("path")
      .attr("d", arc)
      .attr("fill", d => color(d.data.province))
      .attr("stroke", "white").attr("stroke-width", 1.5)
      .append("title").text(d => `${d.data.province}: ${d.data.count}`);

    g.selectAll("text").data(pie.filter(d => (d.endAngle - d.startAngle) > 0.25)).join("text")
      .attr("transform", d => `translate(${arc.centroid(d)})`)
      .attr("text-anchor", "middle").attr("font-size", 11).attr("fill", "white")
      .text(d => d.data.province.replace("British Columbia","BC").replace("Newfoundland And Labrador","NL"));

    // Legend
    const legend = svg.append("g").attr("transform", `translate(${w - 180}, 20)`);
    pd.forEach((d, i) => {
      legend.append("rect").attr("x", 0).attr("y", i * 18).attr("width", 12).attr("height", 12).attr("fill", color(d.province));
      legend.append("text").attr("x", 16).attr("y", i * 18 + 10).attr("font-size", 11).text(`${d.province} (${d.count})`);
    });

    return svg.node();
  }

  function renderTimeline() {
    const fc = filteredCases().filter(d => d.province);
    // Build one row per case with month + province
    const td = fc.map(d => ({
      month: d.document_date_en.slice(0, 7),
      date: new Date(d.document_date_en.slice(0, 7) + "-01"),
      province: d.province
    }));

    // Pre-aggregate: one row per month+province with count
    const grouped = Array.from(
      d3.rollup(td, v => v.length, d => d.month, d => d.province),
      ([month, byProv]) => Array.from(byProv, ([province, count]) => ({
        date: new Date(month + "-01"),
        province,
        count
      }))
    ).flat().sort((a, b) => a.date - b.date);

    return Plot.plot({
      width: paneW(), height: paneH(),
      x: { label: "Month", type: "band" },
      y: { label: "Cases" },
      color: { legend: true },
      marks: [
        Plot.barY(grouped, Plot.stackY({ x: "date", y: "count", fill: "province", tip: true })),
        Plot.ruleY([0])
      ]
    });
  }

  // ── Table ─────────────────────────────────────────────────────────
  const tbody = document.getElementById("tableBody");

  function renderTable() {
    tbody.innerHTML = "";
    const fc = filteredCases();
    [...fc].sort((a, b) => a.citation_en.localeCompare(b.citation_en, undefined, { numeric: true }))
      .forEach(d => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${d.citation_en}</td>
          <td><a href="${d.url_en}" target="_blank">${d.name_en}</a></td>
          <td>${d.document_date_en.slice(0, 10)}</td>
          <td>${d.province ?? "—"}</td>`;
        tbody.appendChild(tr);
      });
  }

  // ── Redraw ────────────────────────────────────────────────────────
  function redraw() {
    pane.innerHTML = "";
    const chart = currentView === "map" ? renderMap()
      : currentView === "bar" ? renderBar()
      : currentView === "pie" ? renderPie()
      : renderTimeline();
    pane.appendChild(chart);
    renderTable();
  }

  // ── View switcher ─────────────────────────────────────────────────
  window.showView = function(view) {
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
    currentView = view;
    redraw();
  };

  // ── Download PNG ──────────────────────────────────────────────────
  window.downloadPNG = async function() {
    const includeLegend = document.getElementById("includeLegend").checked;

    // Temporarily hide legend if not wanted
    const legendEls = pane.querySelectorAll("div");
    if (!includeLegend) legendEls.forEach(el => el.style.visibility = "hidden");

    // Load html2canvas on demand
    if (!window.html2canvas) {
      await new Promise((res, rej) => {
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js";
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    const canvas = await html2canvas(pane, { backgroundColor: "#ffffff", scale: 2, useCORS: true });

    // Restore legend visibility
    if (!includeLegend) legendEls.forEach(el => el.style.visibility = "");

    const a = document.createElement("a");
    a.download = `scc-2017-${currentView}.png`;
    a.href = canvas.toDataURL("image/png");
    a.click();
  };

  // Initial render
  renderTable();
  pane.appendChild(renderMap());
</script>
</body>
</html>
